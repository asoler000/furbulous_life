<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    height: 100%;
}

body {
    font-family: 'Montserrat', sans-serif;
    color: #ffffff;
    min-height: 100vh;
    min-height: -webkit-fill-available;
}

.hero {
    background-image: url('images/estate-coming-soon.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    width: 100%;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
}

.hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.22);
    z-index: 1;
}

/* ===== TOP SECTION: Logo + Tagline ===== */
.top-section {
    position: relative;
    z-index: 2;
    text-align: center;
    padding-top: 15vh;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-left: 40px;
    padding-right: 40px;
}

/* LARGE BOLD LOGO */
.logo {
    width: 85vw;
    max-width: 900px;
    min-width: 280px;
    height: auto;
    margin-bottom: 20px;
}

.launch-line {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: clamp(0.55rem, 1.2vw, 0.72rem);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    opacity: 0.85;
}

/* ===== BOTTOM SECTION: Email Signup ===== */
.bottom-section {
    position: relative;
    z-index: 2;
    text-align: center;
    padding-bottom: 10vh;
    width: 100%;
    max-width: 500px;
    padding-left: 24px;
    padding-right: 24px;
}

.founder-title {
    font-weight: 500;
    letter-spacing: 0.3em;
    font-size: clamp(0.65rem, 2vw, 0.8rem);
    margin-bottom: 10px;
    text-transform: uppercase;
}

.founder-sub {
    font-weight: 300;
    font-size: clamp(0.6rem, 1.8vw, 0.72rem);
    letter-spacing: 0.12em;
    opacity: 0.8;
    margin-bottom: 24px;
    line-height: 1.6;
}

/* Email Form */
.form-row {
    display: flex;
    justify-content: center;
    align-items: stretch;
    gap: 0;
}

.email-input {
    padding: 14px 18px;
    width: 240px;
    border: 1px solid rgba(255,255,255,0.7);
    border-right: none;
    background: rgba(0,0,0,0.12);
    color: #ffffff;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    outline: none;
    transition: all 0.3s ease;
}

.email-input::placeholder {
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.15em;
    font-weight: 300;
}

.email-input:focus {
    background: rgba(0,0,0,0.2);
    border-color: rgba(255,255,255,0.9);
}

.cta-button {
    border: 1px solid rgba(255,255,255,0.7);
    padding: 14px 26px;
    background: transparent;
    color: #ffffff;
    font-family: 'Montserrat', sans-serif;
    letter-spacing: 0.2em;
    font-size: 0.65rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.4s ease;
    white-space: nowrap;
}

.cta-button:hover {
    background-color: rgba(91, 50, 86, 0.85);
    border-color: rgba(91, 50, 86, 0.85);
}

.success-message {
    margin-top: 20px;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    font-weight: 300;
    display: none;
    opacity: 0.9;
}

/* ===== TABLET ===== */
@media (max-width: 900px) {
    .top-section {
        padding-top: 14vh;
        padding-left: 32px;
        padding-right: 32px;
    }
    
    .logo {
        width: 80vw;
        max-width: 700px;
    }
    
    .launch-line {
        letter-spacing: 0.35em;
    }
    
    .bottom-section {
        padding-bottom: 8vh;
    }
}

/* ===== MOBILE ===== */
@media (max-width: 600px) {
    .hero {
        justify-content: flex-start;
    }
    
    .top-section {
        padding-top: 12vh;
        padding-left: 24px;
        padding-right: 24px;
        flex-grow: 0;
    }

    .logo {
        width: 88vw;
        max-width: 400px;
        min-width: 260px;
        margin-bottom: 14px;
    }

    .launch-line {
        font-size: 0.5rem;
        letter-spacing: 0.28em;
        line-height: 1.5;
    }

    .bottom-section {
        margin-top: auto;
        padding-bottom: 8vh;
        padding-left: 28px;
        padding-right: 28px;
    }

    .founder-title {
        font-size: 0.62rem;
        letter-spacing: 0.25em;
        margin-bottom: 8px;
    }

    .founder-sub {
        font-size: 0.58rem;
        letter-spacing: 0.08em;
        margin-bottom: 20px;
        line-height: 1.7;
    }

    .form-row {
        flex-direction: column;
        align-items: center;
        gap: 10px;
    }

    .email-input {
        width: 100%;
        max-width: 280px;
        border-right: 1px solid rgba(255,255,255,0.7);
        text-align: center;
        padding: 13px 16px;
        font-size: 0.68rem;
    }

    .cta-button {
        width: 100%;
        max-width: 280px;
        padding: 13px 24px;
        font-size: 0.62rem;
    }
    
    .success-message {
        font-size: 0.6rem;
        margin-top: 16px;
    }
}

/* ===== VERY SMALL SCREENS ===== */
@media (max-width: 380px) {
    .top-section {
        padding-top: 10vh;
        padding-left: 16px;
        padding-right: 16px;
    }
    
    .logo {
        width: 92vw;
        min-width: 240px;
    }
    
    .launch-line {
        font-size: 0.45rem;
        letter-spacing: 0.22em;
    }
    
    .bottom-section {
        padding-left: 20px;
        padding-right: 20px;
        padding-bottom: 6vh;
    }
    
    .email-input,
    .cta-button {
        max-width: 260px;
    }
}

/* ===== LANDSCAPE MOBILE ===== */
@media (max-height: 500px) and (orientation: landscape) {
    .top-section {
        padding-top: 6vh;

<body>

<div class="hero">

    <!-- TOP: Logo + Launch Line -->
    <div class="top-section">
        <img src="images/furbulous-logo-white.png" alt="FURBULOUS.life™ - Luxury Dog Fashion" class="logo">
        <div class="launch-line">
            Launching September 2026 &nbsp;·&nbsp; The Estate Collection
        </div>
    </div>

    <!-- BOTTOM: Email Signup -->
    <div class="bottom-section">
        <div class="founder-title">
            Join The Founding Pack
        </div>

        <div class="founder-sub">
            Lead the pack. Get exclusive early access + 15% off your first order.
        </div>

        <div class="form-row">
            <input type="email" id="email" class="email-input" placeholder="Your email" required aria-label="Email address">
            <button class="cta-button" onclick="saveEmail()">I'M IN</button>
        </div>

        <div class="success-message" id="success">
            ✓ You're officially part of the pack.
        </div>
    </div>

</div>

<script>
function saveEmail() {
    const email = document.getElementById("email").value;
    if (!email) return;

    let emails = JSON.parse(localStorage.getItem("furbulous_emails")) || [];
    emails.push(email);
    localStorage.setItem("furbulous_emails", JSON.stringify(emails));

    const blob = new Blob([emails.join("\n")], { type: "text/plain" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "furbulous_founders.txt";
    link.click();

    document.getElementById("success").style.display = "block";
    document.getElementById("email").value = "";
}
</script>
