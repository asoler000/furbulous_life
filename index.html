  <!-- BOTTOM -->

    </div>

      Private early access to The Estate Collection.<br>
      Founding members receive 15% on their first order.
    </div>

    <div class="form-row">
      <input type="email" id="email" class="email-input" placeholder="Your email" required aria-label="Email address">
      <button class="cta-button" onclick="saveEmail()">I'M IN</button>
    </div>

    <div class="success-message" id="success">
      ✓ You're officially part of the pack.
    </div>
  </div>

</div>

<script>
function saveEmail() {
  const emailEl = document.getElementById("email");
  const email = (emailEl.value || "").trim();
  if (!email) return;

  // Basic email shape check (lightweight)
  if (!/^\S+@\S+\.\S+$/.test(email)) return;

  let emails = JSON.parse(localStorage.getItem("furbulous_emails")) || [];
  if (!emails.includes(email)) emails.push(email);
  localStorage.setItem("furbulous_emails", JSON.stringify(emails));

  const blob = new Blob([emails.join("\n")], { type: "text/plain" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "furbulous_founders.txt";
  link.click();

  document.getElementById("success").style.display = "block";
  emailEl.value = "";
}
</script>
