<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FURBULOUS.life – Fall 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Montserrat', sans-serif;
    color: #ffffff;
    height: 100vh;
    overflow: hidden;
}

.hero {
    background-image: url('images/estate-coming-soon.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    height: 100vh;
    width: 100%;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
}

.hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.22);
    z-index: 1;
}

/* ===== TOP SECTION: Logo + Tagline ===== */
.top-section {
    position: relative;
    z-index: 2;
    text-align: center;
    padding-top: 15vh;
}

.logo {
    width: 100%;
    max-width: 85vw;
    margin-bottom: 0px;
}

.launch-line {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: 0.7rem;
    letter-spacing: 6px;
    text-transform: uppercase;
    opacity: 0.9;
}

/* ===== BOTTOM SECTION: Email Signup ===== */
.bottom-section {
    position: relative;
    z-index: 2;
    text-align: center;
    padding-bottom: 8vh;
    width: 100%;
    max-width: 600px;
}

.founder-title {
    font-weight: 600;
    letter-spacing: 4px;
    font-size: 0.75rem;
    margin-bottom: 12px;
    text-transform: uppercase;
}

.founder-sub {
    font-weight: 300;
    font-size: 0.7rem;
    letter-spacing: 2px;
    opacity: 0.85;
    margin-bottom: 28px;
}

/* Email Form */
.form-row {
    display: flex;
    justify-content: center;
    gap: 0;
}

.email-input {
    padding: 14px 20px;
    width: 280px;
    border: 1px solid rgba(255,255,255,0.8);
    border-right: none;
    background: rgba(0,0,0,0.15);
    color: #ffffff;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 2px;
    outline: none;
    transition: all 0.3s ease;
}

.email-input::placeholder {
    color: rgba(255,255,255,0.6);
    letter-spacing: 2px;
}

.email-input:focus {
    background: rgba(0,0,0,0.25);
    border-color: #ffffff;
}

.cta-button {
    border: 1px solid rgba(255,255,255,0.8);
    padding: 14px 28px;
    background: transparent;
    color: #ffffff;
    font-family: 'Montserrat', sans-serif;
    letter-spacing: 3px;
    font-size: 0.65rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.4s ease;
}

.cta-button:hover {
    background-color: rgba(91, 50, 86, 0.9);
    border-color: rgba(91, 50, 86, 0.9);
}

.success-message {
    margin-top: 24px;
    font-size: 0.7rem;
    letter-spacing: 2px;
    font-weight: 300;
    display: none;
}

.success-message span {
    opacity: 0.9;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
    .top-section {
        padding-top: 12vh;
    }

    .logo {
        width: 320px;
    }

    .launch-line {
        font-size: 0.55rem;
        letter-spacing: 4px;
    }

    .bottom-section {
        padding-bottom: 6vh;
        padding-left: 20px;
        padding-right: 20px;
    }

    .founder-title {
        font-size: 0.65rem;
        letter-spacing: 3px;
    }

    .founder-sub {
        font-size: 0.6rem;
    }

    .form-row {
        flex-direction: column;
        align-items: center;
        gap: 12px;
    }

    .email-input {
        width: 100%;
        max-width: 300px;
        border-right: 1px solid rgba(255,255,255,0.8);
        text-align: center;
    }

    .cta-button {
        width: 100%;
        max-width: 300px;
    }
}
</style>
</head>

<body>

<div class="hero">

    <!-- TOP: Logo + Launch Line -->
    <div class="top-section">
        <img src="images/furbulous-logo-white.png" alt="FURBULOUS.life" class="logo">
        <div class="launch-line">
            Launching September 2026 &nbsp;·&nbsp; The Estate Collection
        </div>
    </div>

    <!-- BOTTOM: Email Signup -->
    <div class="bottom-section">
        <div class="founder-title">
            Join The Founding Pack
        </div>

        <div class="founder-sub">
            Lead the pack. Get exclusive early access + 15% off your first order.
        </div>

        <div class="form-row">
            <input type="email" id="email" class="email-input" placeholder="Your email" required>
            <button class="cta-button" onclick="saveEmail()">I'M IN</button>
        </div>

        <div class="success-message" id="success">
            <span>✓ You're officially part of the pack.</span>
        </div>
    </div>

</div>

<script>
function saveEmail() {
    const email = document.getElementById("email").value;
    if (!email) return;

    let emails = JSON.parse(localStorage.getItem("furbulous_emails")) || [];
    emails.push(email);
    localStorage.setItem("furbulous_emails", JSON.stringify(emails));

    const blob = new Blob([emails.join("\n")], { type: "text/plain" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "furbulous_founders.txt";
    link.click();

    document.getElementById("success").style.display = "block";
    document.getElementById("email").value = "";
}
</script>

</body>
</html>
